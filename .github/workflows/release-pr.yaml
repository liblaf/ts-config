        uses: liblaf/actions/next-version@c8e76ded35806a60e54afd4500a5174295fe5fa2 # v3
        env:
          GIT_CLIFF_CONFIG_URL: ${{ env.GIT_CLIFF_CONFIG_URL }}
          GITHUB_TOKEN: ${{ github.token }}

  release-pr:
    name: Create PR
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - version
    if: needs.version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    environment:
      name: release-please
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@c8e76ded35806a60e54afd4500a5174295fe5fa2 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install rumdl
        run: pipx install rumdl
      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        env:
          GIT_CLIFF_CONFIG_URL: ${{ env.GIT_CLIFF_CONFIG_URL }}
          GIT_CLIFF_TAG: ${{ needs.version.outputs.tag }}
          OUTPUT: CHANGELOG.md
      - name: Format changelog
        run: rumdl fmt CHANGELOG.md
      - name: Generate PR body
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          args: --verbose --unreleased --strip all
        env:
