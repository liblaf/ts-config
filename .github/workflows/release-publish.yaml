        name: Get version
        run: |-
          tag="$(awk '{ print $NF }' <<< "$TITLE")"
          version="${tag#'v'}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
        env:
          TITLE: ${{ github.event.pull_request.title }}
